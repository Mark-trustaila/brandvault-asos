<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandVault - Trademark Portfolio Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff; color: #37352f; font-size: 14px; line-height: 1.5;
      height: 100vh; overflow: hidden;
    }
    .app { display: flex; height: 100vh; }
    .sidebar {
      width: 240px; min-width: 240px; background: #fbfbfa;
      border-right: 1px solid #e8e5e0; display: flex; flex-direction: column;
      padding: 16px 12px; gap: 4px; overflow-y: auto;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 8px; }
    .logo-mark {
      width: 28px; height: 28px; background: #37352f; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 11px; letter-spacing: 0.5px;
    }
    .org-name { font-size: 13px; font-weight: 600; color: #37352f; }
    .org-sub { font-size: 11px; color: #9b9a97; }
    .nav-section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #9b9a97; padding: 16px 10px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 7px 10px;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #37352f;
      transition: background 0.12s; position: relative;
    }
    .nav-item:hover { background: #f0efec; }
    .nav-item.active { background: #f0efec; font-weight: 600; }
    .nav-item .icon { width: 20px; text-align: center; color: #9b9a97; font-size: 15px; }
    .nav-item.active .icon { color: #37352f; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item.active svg { stroke: #37352f; }
    .nav-item .badge { margin-left: auto; font-size: 11px; font-weight: 600; background: #eb5757; color: #fff; padding: 1px 7px; border-radius: 10px; }
    .nav-item .badge-muted { margin-left: auto; font-size: 11px; color: #9b9a97; }
    .nav-item.dimmed { color: #9b9a97; }
    .nav-item.dimmed .icon { color: #c4c4c0; }
    .nav-item.disabled { opacity: 0.4; pointer-events: none; }
    .topbar-btn.disabled { opacity: 0.4; pointer-events: none; }
    .topbar-btn.primary.disabled { opacity: 0.4; pointer-events: none; }
    .sidebar-footer { margin-top: auto; border-top: 1px solid #e8e5e0; padding-top: 12px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: #e8e5e0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #37352f; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-bottom: 1px solid #e8e5e0; background: #fff; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9b9a97; }
    .breadcrumb span { color: #37352f; font-weight: 500; }
    .topbar-badge { font-size: 12px; padding: 4px 12px; border-radius: 6px; font-weight: 500; background: #e6f4ea; color: #0f7b6c; border: 1px solid #b7e4c7; display: flex; align-items: center; gap: 4px; }
    .topbar-btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid #e8e5e0; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #37352f; transition: all 0.12s; }
    .topbar-btn:hover { background: #f7f6f5; }
    .topbar-btn.primary { background: #37352f; color: #fff; border-color: #37352f; }
    .topbar-btn.primary:hover { background: #2d2c28; }
    .content-area { flex: 1; overflow-y: auto; padding: 20px 28px; }
    .main-panel { display: flex; flex: 1; overflow: hidden; }
    .page-title { font-size: 22px; font-weight: 700; color: #37352f; margin-bottom: 2px; }
    .page-desc { font-size: 12px; color: #9b9a97; margin-bottom: 14px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid #e8e5e0; border-radius: 10px; overflow: hidden; margin-bottom: 14px; background: #fff; }
    .stat-card { padding: 12px 18px; border-right: 1px solid #e8e5e0; cursor: pointer; transition: background 0.12s; }
    .stat-card:hover { background: #fbfbfa; }
    .stat-card:last-child { border-right: none; }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9b9a97; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #37352f; }
    .stat-value.alert { color: #eb5757; }
    .stat-change { font-size: 11px; color: #0f7b6c; margin-top: 1px; }
    .stat-change.down { color: #eb5757; }
    .stat-card.alert-top { border-top: 3px solid #eb5757; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 340px; gap: 0; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-dot.red { background: #eb5757; box-shadow: 0 0 0 3px rgba(235,87,87,0.12); }
    .section-dot.blue { background: #2e6b8a; box-shadow: 0 0 0 3px rgba(46,107,138,0.12); }
    .section-dot.green { background: #0f7b6c; box-shadow: 0 0 0 3px rgba(15,123,108,0.12); }
    .section-title { font-size: 15px; font-weight: 600; color: #37352f; }
    .section-count { font-size: 11px; font-weight: 600; color: #eb5757; background: rgba(235,87,87,0.08); padding: 2px 8px; border-radius: 10px; }
    .section-count.blue { color: #2e6b8a; background: rgba(46,107,138,0.08); }
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #e8e5e0; margin-bottom: 16px; }
    .tab-item { padding: 10px 18px; font-size: 13px; color: #9b9a97; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
    .tab-item:hover { color: #37352f; }
    .tab-item.active { color: #37352f; font-weight: 600; border-bottom-color: #37352f; }
    .action-list { display: flex; flex-direction: column; gap: 2px; }
    .action-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 8px; transition: background 0.12s; cursor: pointer; border-left: 3px solid transparent; }
    .action-card:hover { background: #fbfbfa; }
    .action-card .initials { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .action-card .info { flex: 1; }
    .action-card .title { font-size: 13px; font-weight: 600; color: #37352f; }
    .action-card .sub { font-size: 12px; color: #9b9a97; margin-top: 1px; }
    .action-card .days-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 10px; white-space: nowrap; }
    .action-card .office-label { font-size: 11px; color: #9b9a97; margin-left: 8px; }
    .family-card { border: 1px solid #e8e5e0; border-radius: 10px; overflow: hidden; margin-bottom: 8px; background: #fff; }
    .family-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; transition: background 0.12s; }
    .family-header:hover { background: #fbfbfa; }
    .family-initials { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .family-info { flex: 1; }
    .family-name { font-size: 14px; font-weight: 600; color: #37352f; }
    .family-meta { font-size: 12px; color: #9b9a97; margin-top: 1px; }
    .family-count { font-size: 12px; font-weight: 500; color: #2e6b8a; background: rgba(46,107,138,0.08); padding: 4px 12px; border-radius: 10px; }
    .family-toggle { color: #9b9a97; margin-left: 8px; cursor: pointer; font-size: 12px; }
    .family-body { border-top: 1px solid #e8e5e0; display: none; }
    .family-body.expanded { display: block; }
    .patent-row { display: flex; align-items: center; padding: 10px 18px 10px 68px; border-bottom: 1px solid #f0efec; font-size: 13px; }
    .patent-row:last-child { border-bottom: none; }
    .patent-office { font-size: 11px; font-weight: 600; color: #2e6b8a; width: 60px; }
    .patent-number { flex: 1; color: #37352f; }
    .patent-status { font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: 10px; }
    .pipeline-container { display: flex; align-items: center; justify-content: space-between; padding: 32px 24px; border: 1px solid #e8e5e0; border-radius: 12px; background: #fff; margin-bottom: 32px; }
    .pipeline-stage { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .pipeline-bubble { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; border: 2px solid #e8e5e0; background: #fff; color: #37352f; transition: all 0.2s; }
    .pipeline-bubble.active { border-color: #2e6b8a; background: rgba(46,107,138,0.06); color: #2e6b8a; }
    .pipeline-bubble.highlight { border-color: #0f7b6c; background: rgba(15,123,108,0.06); color: #0f7b6c; }
    .pipeline-bubble.warning { border-color: #eb5757; background: rgba(235,87,87,0.06); color: #eb5757; }
    .pipeline-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9b9a97; }
    .pipeline-arrow { color: #d3d1cb; font-size: 16px; }
    .pipeline-stage { cursor: pointer; }
    .pipeline-stage:hover .pipeline-bubble { transform: scale(1.08); }
    .pipeline-bubble.selected { box-shadow: 0 0 0 3px rgba(46,107,138,0.25); }
    .pipeline-filtered-list { margin-top: 20px; }
    .pipeline-filtered-header { font-size: 13px; font-weight: 600; color: #37352f; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .pipeline-filtered-header .pf-count { font-size: 11px; font-weight: 600; color: #2e6b8a; background: rgba(46,107,138,0.08); padding: 2px 8px; border-radius: 10px; }
    .pipeline-filtered-header .pf-clear { font-size: 11px; color: #9b9a97; cursor: pointer; margin-left: auto; }
    .pipeline-filtered-header .pf-clear:hover { color: #eb5757; }
    /* Search bar */
    .search-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border: 1px solid #e8e5e0; border-radius: 8px;
      background: #fff; margin-bottom: 12px; transition: border-color 0.15s;
    }
    .search-bar:focus-within { border-color: #2e6b8a; box-shadow: 0 0 0 2px rgba(46,107,138,0.08); }
    .search-bar .search-icon { color: #9b9a97; font-size: 14px; flex-shrink: 0; }
    .search-bar input {
      flex: 1; border: none; outline: none; font-size: 13px; font-family: inherit;
      color: #37352f; background: transparent;
    }
    .search-bar input::placeholder { color: #c4c4c0; }
    .search-bar .search-clear {
      font-size: 14px; color: #d3d1cb; cursor: pointer; background: none;
      border: none; padding: 0 2px; display: none;
    }
    .search-bar .search-clear.visible { display: block; }
    .search-bar .search-clear:hover { color: #9b9a97; }
    .search-bar .search-count { font-size: 11px; color: #9b9a97; white-space: nowrap; }
    .tech-area-section { margin-top: 8px; }
    .tech-area-title { font-size: 15px; font-weight: 600; color: #37352f; margin-bottom: 16px; }
    .tech-bar-row { display: flex; align-items: center; margin-bottom: 16px; }
    .tech-bar-label { width: 140px; font-size: 13px; color: #37352f; font-weight: 500; flex-shrink: 0; }
    .tech-bar-track { flex: 1; height: 8px; background: #f0efec; border-radius: 4px; margin: 0 12px; overflow: hidden; }
    .tech-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .tech-bar-value { font-size: 12px; color: #9b9a97; width: 120px; text-align: right; white-space: nowrap; }
    .office-list { display: flex; flex-direction: column; gap: 2px; }
    .office-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 8px; transition: background 0.12s; cursor: pointer; }
    .office-card:hover { background: #fbfbfa; }
    .office-initials { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .office-info { flex: 1; }
    .office-name { font-size: 14px; font-weight: 600; color: #37352f; }
    .office-meta { font-size: 12px; color: #9b9a97; margin-top: 1px; }
    .office-count { font-size: 12px; font-weight: 500; color: #2e6b8a; background: rgba(46,107,138,0.08); padding: 4px 12px; border-radius: 10px; }
    .office-toggle { color: #9b9a97; margin-left: 8px; cursor: pointer; font-size: 12px; }
    .office-body { border-top: 1px solid #e8e5e0; display: none; }
    .office-body.expanded { display: block; }
    .right-panel { width: 340px; min-width: 340px; border-left: 1px solid #e8e5e0; background: #fbfbfa; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }
    .panel-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9b9a97; margin-bottom: 12px; }
    .renewal-list { border: 1px solid #e8e5e0; border-radius: 10px; overflow: hidden; background: #fff; }
    .renewal-item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid #f0efec; cursor: pointer; transition: background 0.12s; }
    .renewal-item:last-child { border-bottom: none; }
    .renewal-item:hover { background: #fbfbfa; }
    .renewal-initials { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .renewal-info { flex: 1; }
    .renewal-title { font-size: 13px; font-weight: 500; color: #37352f; }
    .renewal-sub { font-size: 11px; color: #9b9a97; }
    .renewal-days { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; }
    .info-card { border: 1px solid #e8e5e0; border-radius: 10px; padding: 16px; background: #fff; border-left: 3px solid #2e6b8a; }
    .info-card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9b9a97; margin-bottom: 8px; }
    .info-card-text { font-size: 13px; color: #37352f; line-height: 1.5; }
    .view-all { display: flex; align-items: center; justify-content: space-between; }
    .view-all-link { font-size: 12px; color: #2e6b8a; cursor: pointer; text-decoration: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* Report overlay & panel */
    .report-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .report-overlay.open { display: block; }
    .report-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.12); }
    .report-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 480px;
      background: #fff; border-left: 1px solid #e8e5e0;
      box-shadow: -2px 0 12px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; z-index: 201;
    }
    .report-header {
      padding: 20px 24px; border-bottom: 1px solid #e8e5e0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .report-header h2 { font-size: 18px; font-weight: 700; color: #37352f; display: flex; align-items: center; gap: 8px; }
    .report-close { cursor: pointer; font-size: 20px; color: #9b9a97; background: none; border: none; padding: 4px; }
    .report-close:hover { color: #37352f; }
    .report-body { flex: 1; overflow-y: auto; padding: 24px; }
    .report-section { margin-bottom: 24px; }
    .report-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #9b9a97; margin-bottom: 10px;
    }
    /* Presets */
    .preset-list { display: flex; flex-direction: column; gap: 4px; }
    .preset-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border: 1px solid #e8e5e0; border-radius: 8px; cursor: pointer;
      transition: all 0.12s; background: #fff;
    }
    .preset-item:hover { background: #fbfbfa; border-color: #d3d1cb; }
    .preset-item.selected { border-color: #37352f; background: #f7f6f5; }
    .preset-icon { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: #f7f6f5; border-radius: 6px; }
    .preset-info { flex: 1; }
    .preset-name { font-size: 13px; font-weight: 600; color: #37352f; }
    .preset-desc { font-size: 11px; color: #9b9a97; }
    /* Filter chips */
    .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .filter-chip {
      font-size: 12px; padding: 4px 12px; border-radius: 14px;
      border: 1px solid #e8e5e0; background: #fff; cursor: pointer;
      transition: all 0.12s; color: #37352f;
    }
    .filter-chip:hover { border-color: #d3d1cb; }
    .filter-chip.active { background: #37352f; color: #fff; border-color: #37352f; }
    .filter-label { font-size: 13px; font-weight: 600; color: #37352f; margin-bottom: 6px; margin-top: 12px; }
    .filter-select {
      width: 100%; padding: 8px 12px; border: 1px solid #e8e5e0;
      border-radius: 6px; font-size: 13px; color: #37352f;
      background: #fff; margin-top: 6px;
    }
    /* Export format cards */
    .format-row { display: flex; gap: 8px; }
    .format-card {
      flex: 1; padding: 12px; border: 1px solid #e8e5e0; border-radius: 8px;
      background: #fff; cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .format-card:hover { border-color: #d3d1cb; background: #fbfbfa; }
    .format-card.selected { border-color: #37352f; background: #f7f6f5; }
    .format-card .fmt-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .format-card .fmt-label { font-size: 12px; font-weight: 600; color: #37352f; }
    .format-card .fmt-desc { font-size: 10px; color: #9b9a97; }
    /* Preview table */
    .report-preview {
      border: 1px solid #e8e5e0; border-radius: 8px; overflow: hidden; margin-top: 12px;
      max-height: 200px; overflow-y: auto; font-size: 11px;
    }
    .report-preview table { width: 100%; border-collapse: collapse; }
    .report-preview th {
      background: #f7f6f5; padding: 6px 10px; text-align: left; font-weight: 600;
      color: #37352f; border-bottom: 1px solid #e8e5e0; position: sticky; top: 0;
    }
    .report-preview td { padding: 6px 10px; border-bottom: 1px solid #f0efec; color: #37352f; }
    /* Report footer */
    .report-footer {
      padding: 16px 24px; border-top: 1px solid #e8e5e0;
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .report-footer button {
      padding: 8px 20px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all 0.12s;
    }
    .btn-cancel { background: #fff; border: 1px solid #e8e5e0; color: #37352f; }
    .btn-cancel:hover { background: #f7f6f5; }
    .btn-download { background: #37352f; border: 1px solid #37352f; color: #fff; }
    .btn-download:hover { background: #2d2c28; }
    /* Detail panel overlay */
    .detail-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .detail-overlay.open { display: block; }
    .detail-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.12); }
    .detail-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 520px;
      background: #fff; border-left: 1px solid #e8e5e0;
      box-shadow: -2px 0 12px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; z-index: 201;
    }
    .detail-header {
      padding: 20px 24px; border-bottom: 1px solid #e8e5e0;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .detail-header-badge {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .detail-header-info { flex: 1; }
    .detail-header-info h2 { font-size: 18px; font-weight: 700; color: #37352f; margin-bottom: 2px; }
    .detail-header-info .detail-sub { font-size: 12px; color: #9b9a97; }
    .detail-close { cursor: pointer; font-size: 20px; color: #9b9a97; background: none; border: none; padding: 4px; margin-left: auto; }
    .detail-close:hover { color: #37352f; }
    .detail-body { flex: 1; overflow-y: auto; padding: 24px; }
    .detail-section { margin-bottom: 24px; }
    .detail-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #9b9a97; margin-bottom: 10px;
    }

<body>
  <div class="app">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="main-panel">
        <div class="content-area" id="contentArea"></div>
        <div class="right-panel" id="rightPanel"></div>
      </div>
    </div>
  </div>
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-backdrop" id="detailBackdrop"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
  <div class="report-overlay" id="reportOverlay">
    <div class="report-backdrop" id="reportBackdrop"></div>
    <div class="report-panel" id="reportPanel"></div>
  </div>

  <script>
    const h = (tag, cls, txt) => {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (txt) e.textContent = txt;
      return e;
    };

    const badgeColors = ['#2e6b8a','#6940a5','#0f7b6c','#c4823f','#8b5e3c','#5a7d5a','#b85450','#4a6fa5'];
    const niceClassColors = ['#2e6b8a','#6940a5','#0f7b6c','#c4823f','#8b5e3c'];
    let data = null;
    let searchQuery = '';
    let pipelineFilter = null;

    // Notes storage (localStorage-backed)
    const NOTES_KEY = 'brandvault_notes';
    const loadNotes = () => {
      try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch { return {}; }
    };
    const saveNotes = (notes) => localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
    const getNotesForTrademark = (id) => (loadNotes()[id] || []);
    const addNote = (trademarkId, text, link, html) => {
      const notes = loadNotes();
      if (!notes[trademarkId]) notes[trademarkId] = [];
      notes[trademarkId].unshift({
        id: Date.now().toString(36),
        text, html: html || null, link: link || null,
        author: 'MK', authorFull: 'Mark Kingsley-Williams',
        date: new Date().toISOString()
      });
      saveNotes(notes);
      return notes[trademarkId];
    };
    const deleteNote = (trademarkId, noteId) => {
      const notes = loadNotes();
      if (notes[trademarkId]) {
        notes[trademarkId] = notes[trademarkId].filter(n => n.id !== noteId);
        saveNotes(notes);
      }
      return notes[trademarkId] || [];
    };

    // Registry-specific obligation rules
    const registryObligations = {
      'USPTO': [
        { type: 'Declaration of Use', yearsAfterReg: 5, window: 1, desc: 'Section 8 Declaration of Continued Use (Years 5-6)', critical: true },
        { type: 'Incontestability', yearsAfterReg: 5, window: 1, desc: 'Section 15 Declaration of Incontestability (Years 5-6)', critical: false },
        { type: 'Renewal + Declaration', yearsAfterReg: 10, window: 1, desc: 'Section 8 & 9 Combined Renewal and Declaration', critical: true, recurring: 10 }
      ],
      'UKIPO': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Renewal due every 10 years from filing date', critical: true, recurring: 10 }
      ],
      'EUIPO': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Renewal due every 10 years from filing date', critical: true, recurring: 10 },
        { type: 'Proof of Use', yearsAfterReg: 5, window: 0, desc: 'Vulnerable to revocation for non-use after 5 years', critical: false }
      ],
      'WIPO': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Madrid Protocol renewal every 10 years', critical: true, recurring: 10 }
      ],
      'INPI': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Renewal every 10 years', critical: true, recurring: 10 }
      ],
      'IPOS': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Renewal every 10 years', critical: true, recurring: 10 }
      ],
      'IP Australia': [
        { type: 'Renewal', yearsAfterReg: 10, window: 0.5, desc: 'Renewal every 10 years', critical: true, recurring: 10 }
      ]
    };

    const getObligationsForTrademark = (trademark) => {
      const rules = registryObligations[trademark.registry_name] || [];
      const regDate = trademark.registration_date ? new Date(trademark.registration_date) : null;
      if (!regDate) return [];
      const obligations = [];
      const now = new Date();

      rules.forEach(rule => {
        const maxYears = rule.recurring ? 100 : rule.yearsAfterReg;
        for (let yr = rule.yearsAfterReg; yr <= maxYears; yr += (rule.recurring || maxYears + 1)) {
          const dueDate = new Date(regDate);
          dueDate.setFullYear(dueDate.getFullYear() + yr);
          const windowStart = new Date(dueDate);
          windowStart.setMonth(windowStart.getMonth() - (rule.window * 12));
          const daysUntil = Math.floor((dueDate - now) / (1000 * 60 * 60 * 24));
          if (daysUntil < -365) continue;
          if (daysUntil > 365 * 15) break;
          obligations.push({
            type: rule.type,
            desc: rule.desc,
            dueDate,
            windowStart,
            daysUntil,
            critical: rule.critical,
            actionable: daysUntil <= 180 && daysUntil > 0,
            overdue: daysUntil < 0,
            inWindow: now >= windowStart && daysUntil > 0
          });
        }
      });

      return obligations.sort((a, b) => a.daysUntil - b.daysUntil);
    };

    const getDaysBadgeColor = (days) => {
      if (days <= 90) return { bg: 'rgba(235,87,87,0.08)', color: '#eb5757', text: `${days}d` };
      if (days <= 180) return { bg: '#f2994a', color: '#fff', text: `${days}d` };
      if (days <= 365) return { bg: 'rgba(15,123,108,0.08)', color: '#0f7b6c', text: `${days}d` };
      return { bg: '#f0efec', color: '#9b9a97', text: `${days}d` };
    };

    const getStatusColor = (status) => {
      const map = {
        'Registered': { bg: 'rgba(15,123,108,0.08)', color: '#0f7b6c' },
        'Pending': { bg: 'rgba(242,153,74,0.08)', color: '#f2994a' },
        'Published': { bg: 'rgba(46,107,138,0.08)', color: '#2e6b8a' },
        'Expired': { bg: 'rgba(235,87,87,0.08)', color: '#eb5757' },
        'Abandoned': { bg: 'rgba(235,87,87,0.08)', color: '#eb5757' }
      };
      return map[status] || { bg: '#f0efec', color: '#9b9a97' };
    };

    const calculateDaysRemaining = (expiryDate) => {
      const expiry = new Date(expiryDate);
      const today = new Date();
      return Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
    };

    const initials = (str) => str?.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || 'N/A';

    const matchesSearch = (trademark) => {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (trademark.mark_text || '').toLowerCase().includes(q) ||
             (trademark.application_number || '').toLowerCase().includes(q) ||
             (trademark.registration_number || '').toLowerCase().includes(q) ||
             (trademark.registry_name || '').toLowerCase().includes(q) ||
             (trademark.status || '').toLowerCase().includes(q) ||
             (trademark.client_agent_name || '').toLowerCase().includes(q);
    };

    const loadData = async () => {
      try {
        const response = await fetch('./trademark-data.json');
        data = await response.json();
      } catch (e) {
        console.error('Error loading data:', e);
        data = { count: 0, trademarks: [], fetchedAt: new Date().toISOString() };
      }
      renderApp();
    };

    const buildSidebar = () => {
      const sidebar = document.getElementById('sidebar');

      const tabMap = {
        'actions-required': 0,
        'by-mark': 1,
        'pipeline': 2,
        'by-registry': 3,
        'actions': 0

      const idx = tabMap[tabName] || 0;
      if (tabs[idx]) tabs[idx].classList.add('active');
      if (contents[idx]) contents[idx].classList.add('active');
    };

    const showTrademarkDetail = (trademark) => {
      const overlay = document.getElementById('detailOverlay');
      const backdrop = document.getElementById('detailBackdrop');
      const panel = document.getElementById('detailPanel');
      panel.textContent = '';

      backdrop.onclick = () => overlay.classList.remove('open');

      // Deselect previous
      document.querySelectorAll('.patent-row.selected, .action-card.selected').forEach(el => el.classList.remove('selected'));

      const isRegistered = trademark.status === 'Registered';
      const isPending = trademark.status === 'Pending' || trademark.status === 'Published';

      // Header
      const header = h('div', 'detail-header');
      const badge = h('div', 'detail-header-badge');
      badge.textContent = initials(trademark.mark_text);
      const colorIdx = Object.keys(
        data.trademarks.reduce((acc, t) => { acc[t.mark_text] = true; return acc; }, {})
      ).indexOf(trademark.mark_text);
      badge.style.backgroundColor = badgeColors[Math.abs(colorIdx) % badgeColors.length];
      header.appendChild(badge);

      const headerInfo = h('div', 'detail-header-info');
      const h2 = document.createElement('h2');
      h2.textContent = trademark.mark_text;
      headerInfo.appendChild(h2);
      headerInfo.appendChild(h('div', 'detail-sub', `${trademark.registry_name} \u00B7 ${trademark.application_number}`));
      header.appendChild(headerInfo);

      const closeBtn = h('button', 'detail-close', '\u2715');
      closeBtn.onclick = () => overlay.classList.remove('open');
      header.appendChild(closeBtn);
      panel.appendChild(header);

      // Body
      const body = h('div', 'detail-body');

      const fmtD = (dateStr) => {
        if (!dateStr) return '\u2014';
        return new Date(dateStr).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      };
      const fmtShort = (d) => { if (!d) return ''; const dt = new Date(d); return dt.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }); };
      const now = new Date();

      // === STATUS SECTION (always first) ===
      const statusSection = h('div', 'detail-section');
      statusSection.appendChild(h('div', 'detail-section-title', 'STATUS'));
      const statusColor = getStatusColor(trademark.status);
      const statusBadge = h('span', 'detail-status-badge', trademark.status);
      statusBadge.style.backgroundColor = statusColor.bg;
      statusBadge.style.color = statusColor.color;
      const statusRow = h('div');
      statusRow.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:8px;';
      statusRow.appendChild(statusBadge);
      const days = calculateDaysRemaining(trademark.expiry_date);
      if (days > 0) {
        const daysBadge = getDaysBadgeColor(days);
        const daysEl = h('span', 'detail-status-badge');
        daysEl.textContent = `${days} days to expiry`;
        daysEl.style.backgroundColor = daysBadge.bg;
        daysEl.style.color = daysBadge.color;
        statusRow.appendChild(daysEl);
      }
      statusSection.appendChild(statusRow);
      body.appendChild(statusSection);

      // === HELPER: Build Notes Section ===
      const buildNotesSection = () => {
        const userNotesSection = h('div', 'detail-section');
        const existingNotes = getNotesForTrademark(trademark.id);
        userNotesSection.appendChild(h('div', 'detail-section-title', `NOTES${existingNotes.length > 0 ? ' (' + existingNotes.length + ')' : ''}`));

        // Composer with contenteditable
        const composer = h('div', 'notes-composer');
        const editor = document.createElement('div');
        editor.className = 'note-editor';
        editor.contentEditable = 'true';
        editor.dataset.placeholder = 'Add a note\u2026 Paste from registry letters, emails, or type directly.';
        composer.appendChild(editor);

        const actions = h('div', 'notes-composer-actions');
        const linkInput = document.createElement('input');
        linkInput.className = 'notes-link-input';
        linkInput.type = 'url';
        linkInput.placeholder = 'Paste link (Teams, Google Docs, DMS\u2026)';

        const linkBtn = h('button', 'notes-btn-link', '\uD83D\uDD17 Link');
        linkBtn.onclick = () => {
          linkInput.classList.toggle('visible');
          linkBtn.classList.toggle('active');
          if (linkInput.classList.contains('visible')) linkInput.focus();
        };
        actions.appendChild(linkBtn);
        actions.appendChild(linkInput);

        const saveBtn = h('button', 'notes-btn-save', 'Add note');
        saveBtn.disabled = true;
        editor.addEventListener('input', () => {
          saveBtn.disabled = !editor.textContent.trim();
        });

        // Sanitize pasted HTML — keep formatting, strip scripts
        editor.addEventListener('paste', (e) => {
          const html = e.clipboardData.getData('text/html');
          if (html) {
            e.preventDefault();
            const temp = document.createElement('div');
            temp.innerHTML = html;
            // Remove script tags, event handlers, etc.
            temp.querySelectorAll('script,style,link,meta').forEach(el => el.remove());
            temp.querySelectorAll('*').forEach(el => {
              // Remove dangerous attributes
              ['onclick','onerror','onload','onmouseover'].forEach(attr => el.removeAttribute(attr));
            });
            const selection = window.getSelection();
            if (selection.rangeCount) {
              const range = selection.getRangeAt(0);
              range.deleteContents();
              const frag = range.createContextualFragment(temp.innerHTML);
              range.insertNode(frag);
              range.collapse(false);
              selection.removeAllRanges();
              selection.addRange(range);
            }
            saveBtn.disabled = !editor.textContent.trim();
          }
        });

        const notesList = h('div');
        notesList.id = 'notesList-' + trademark.id;

        const renderNotes = () => {
          notesList.textContent = '';
          const notes = getNotesForTrademark(trademark.id);
          if (notes.length === 0) {
            notesList.appendChild(h('div', 'note-empty', 'No notes yet'));
            return;
          }
          notes.forEach((note, nIdx) => {
            const card = h('div', 'note-card');
            // Most recent note fully expanded, older ones truncated
            const isNewest = nIdx === 0;

            const noteHeader = h('div', 'note-header');
            noteHeader.appendChild(h('div', 'note-avatar', note.author || 'MK'));
            const meta = h('div', 'note-meta');
            const strong = document.createElement('strong');
            strong.textContent = note.authorFull || 'Mark Kingsley-Williams';
            meta.appendChild(strong);
            meta.appendChild(document.createTextNode(' \u00B7 ' + fmtD(note.date)));
            noteHeader.appendChild(meta);
            const delBtn = h('button', 'note-delete', '\u00D7');
            delBtn.title = 'Delete note';
            delBtn.onclick = () => { deleteNote(trademark.id, note.id); renderNotes(); };
            noteHeader.appendChild(delBtn);
            card.appendChild(noteHeader);

            // Rich text display
            const textEl = h('div', note.html ? 'note-text-rich' : 'note-text');
            if (!isNewest) textEl.classList.add('note-preview');
            if (note.html) {
              textEl.innerHTML = note.html;
            } else {
              textEl.textContent = note.text;
            }
            card.appendChild(textEl);

            // Expand button for truncated older notes
            if (!isNewest && (note.text?.length > 120 || note.html)) {
              const expandBtn = h('button', 'note-expand-btn', 'Show more');
              expandBtn.onclick = () => {
                const isExpanded = card.classList.contains('expanded');
                card.classList.toggle('expanded');
                expandBtn.textContent = isExpanded ? 'Show more' : 'Show less';
              };
              card.appendChild(expandBtn);
            } else if (isNewest) {
              card.classList.add('expanded');
            }

            if (note.link) {
              const chipLink = document.createElement('a');
              chipLink.className = 'note-link-chip';
              chipLink.href = note.link;
              chipLink.target = '_blank';
              chipLink.rel = 'noopener';
              const domain = (() => { try { return new URL(note.link).hostname.replace('www.',''); } catch { return 'link'; } })();
              chipLink.textContent = '\uD83D\uDD17 ' + domain;
              card.appendChild(chipLink);
            }
            notesList.appendChild(card);
          });
        };

        saveBtn.onclick = () => {
          const plainText = editor.textContent.trim();
          if (!plainText) return;
          const htmlContent = editor.innerHTML.trim();
          const link = linkInput.value.trim() || null;
          // Store both plain text and HTML if formatting was used
          const hasFormatting = htmlContent !== plainText && htmlContent.includes('<');
          addNote(trademark.id, plainText, link, hasFormatting ? htmlContent : null);
          editor.textContent = '';
          linkInput.value = '';
          linkInput.classList.remove('visible');
          linkBtn.classList.remove('active');
          saveBtn.disabled = true;
          renderNotes();
          const titleEl = userNotesSection.querySelector('.detail-section-title');
          const count = getNotesForTrademark(trademark.id).length;
          if (titleEl) titleEl.textContent = `NOTES (${count})`;
        };
        actions.appendChild(saveBtn);
        composer.appendChild(actions);
        userNotesSection.appendChild(composer);
        userNotesSection.appendChild(notesList);
        renderNotes();
        return userNotesSection;
      };

      // === HELPER: Build Rights Record with Inline G&S ===
      const buildRightsRecord = () => {
        const coreSection = h('div', 'detail-section');
        coreSection.appendChild(h('div', 'detail-section-title', 'RIGHTS RECORD'));
        const grid = h('div', 'detail-grid');

        const addField = (label, value, full) => {
          const field = h('div', full ? 'detail-field full' : 'detail-field');
          field.appendChild(h('div', 'detail-field-label', label));
          field.appendChild(h('div', 'detail-field-value', value || '\u2014'));
          grid.appendChild(field);
        };

        addField('Registry', `${trademark.registry_official_name || trademark.registry_name}`);
        addField('Jurisdiction', trademark.registry_description || '\u2014');
        addField('Application No.', trademark.application_number);
        addField('Registration No.', trademark.registration_number || '\u2014');
        addField('Filed', fmtD(trademark.application_date));
        addField('Registered', fmtD(trademark.registration_date));
        addField('Mark Type', trademark.mark_feature || '\u2014');
        addField('Expiry', fmtD(trademark.expiry_date));
        addField('Owner', trademark.client_agent_name || '\u2014', true);

        // Inline G&S as class badges
        if (trademark.good_and_services && trademark.good_and_services.length > 0) {
          const gsField = h('div', 'detail-field full');
          gsField.appendChild(h('div', 'detail-field-label', `GOODS & SERVICES (${trademark.good_and_services.length} CLASSES)`));
          const badgeRow = h('div', 'gs-inline-row');
          const gsDetailArea = h('div');

          trademark.good_and_services.forEach((gs, gIdx) => {
            const inlineBadge = h('span', 'gs-inline-badge');
            inlineBadge.textContent = `${gs.search_class ? gs.search_class.number : '?'}`;
            inlineBadge.style.backgroundColor = niceClassColors[gIdx % niceClassColors.length];
            inlineBadge.title = gs.search_class ? gs.search_class.name : 'Unknown';

            // Expandable detail for each class
            const detail = h('div', 'gs-expanded-detail');
            detail.id = `gs-detail-${trademark.id}-${gIdx}`;
            if (gs.search_class) {
              detail.appendChild(h('div', 'gs-expanded-class-name', `Class ${gs.search_class.number} \u2014 ${gs.search_class.name}`));
            }
            if (gs.text) {
              const gsTextEl = h('div');
              gsTextEl.textContent = gs.text;
              detail.appendChild(gsTextEl);
            }
            if (gs.search_class && gs.search_class.description) {
              detail.appendChild(h('div', 'gs-expanded-desc', gs.search_class.description));
            }

            inlineBadge.onclick = (e) => {
              e.stopPropagation();
              const wasVisible = detail.classList.contains('visible');
              // Hide all
              gsDetailArea.querySelectorAll('.gs-expanded-detail').forEach(d => d.classList.remove('visible'));
              badgeRow.querySelectorAll('.gs-inline-badge').forEach(b => b.classList.remove('active'));
              if (!wasVisible) {
                detail.classList.add('visible');
                inlineBadge.classList.add('active');
              }
            };

            badgeRow.appendChild(inlineBadge);
            gsDetailArea.appendChild(detail);
          });

          gsField.appendChild(badgeRow);
          grid.appendChild(gsField);
          coreSection.appendChild(grid);
          coreSection.appendChild(gsDetailArea);
        } else {
          coreSection.appendChild(grid);
        }

        return coreSection;
      };

      // === HELPER: Build Timeline ===
      const buildTimeline = () => {
        const timelineSection = h('div', 'detail-section');

        if (isRegistered) {
          // Compact single-line timeline for registered marks
          timelineSection.appendChild(h('div', 'detail-section-title', 'TIMELINE'));
          const compact = h('div', 'compact-timeline');
          const preEvents = [
            { label: 'Filed', date: trademark.application_date },
            { label: 'Published', date: trademark.publication_date },
            { label: 'Registered', date: trademark.registration_date }
          ].filter(e => e.date);

          preEvents.forEach((evt, i) => {
            if (i > 0) compact.appendChild(h('span', 'ct-arrow', '\u2192'));
            const evtEl = h('span', 'ct-event');
            evtEl.appendChild(h('span', 'ct-label', evt.label + ' '));
            evtEl.appendChild(h('span', 'ct-date', fmtShort(evt.date)));
            compact.appendChild(evtEl);
          });
          timelineSection.appendChild(compact);
        } else {
          // Full horizontal timeline for pending/published marks
          timelineSection.appendChild(h('div', 'detail-section-title', 'REGISTRATION TIMELINE'));
          const track1Container = h('div', 'htimeline-container');
          const track1 = h('div', 'htimeline-track');
          track1.appendChild(h('div', 'htimeline-line'));

          const preEvents = [
            { label: 'Filed', date: trademark.application_date },
            { label: 'Published', date: trademark.publication_date },
            { label: 'Granted', date: trademark.grant_date },
            { label: 'Registered', date: trademark.registration_date }
          ].filter(e => e.date);

          // Add future milestones for pending marks
          if (isPending) {
            const allLabels = preEvents.map(e => e.label);
            if (!allLabels.includes('Published')) preEvents.push({ label: 'Published', date: null, future: true });
            if (!allLabels.includes('Registered')) preEvents.push({ label: 'Registered', date: null, future: true });
          }

          if (trademark.office_action_date) {
            preEvents.push({ label: 'Office Action', date: trademark.office_action_date });
            preEvents.sort((a, b) => {
              if (!a.date) return 1; if (!b.date) return 1;
              return new Date(a.date) - new Date(b.date);
            });
          }

          preEvents.forEach(evt => {
            const event = h('div', 'htimeline-event');
            const evtDate = evt.date ? new Date(evt.date) : null;
            const isPast = evtDate ? evtDate <= now : false;
            let dotClass = 'future';
            if (evt.future) dotClass = 'future';
            else if (evt.label === 'Office Action') dotClass = 'warning';
            else if (evt.label === 'Registered' || evt.label === 'Granted') dotClass = 'filled';
            else if (isPast) dotClass = 'active';
            event.appendChild(h('div', 'htimeline-evt-label', evt.label));
            event.appendChild(h('div', `htimeline-dot ${dotClass}`));
            event.appendChild(h('div', 'htimeline-evt-date', evt.date ? fmtShort(evt.date) : '\u2014'));
            track1.appendChild(event);
          });
          track1Container.appendChild(track1);
          timelineSection.appendChild(track1Container);
        }

        // Post-registration obligations (for all marks that have them)
        const obligations = getObligationsForTrademark(trademark);
        const postEvents = [];
        if (trademark.expiry_date) {
          postEvents.push({ label: 'Expiry', date: trademark.expiry_date, isExpiry: true });
        }
        obligations.forEach(ob => {
          postEvents.push({ label: ob.type, date: ob.dueDate.toISOString(), obligation: ob });
        });
        postEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (postEvents.length > 0) {
          const track2Container = h('div', 'htimeline-container');
          track2Container.style.marginTop = '12px';
          track2Container.appendChild(h('div', 'htimeline-label', 'Post-Registration Obligations'));
          const track2 = h('div', 'htimeline-track');
          track2.appendChild(h('div', 'htimeline-line'));

          postEvents.slice(0, 6).forEach(evt => {
            const event = h('div', 'htimeline-event');
            const evtDate = new Date(evt.date);
            const daysTo = Math.floor((evtDate - now) / (1000 * 60 * 60 * 24));
            let dotClass = 'future';
            if (daysTo < 0) dotClass = 'filled';
            else if (daysTo <= 90) dotClass = 'danger';
            else if (daysTo <= 180) dotClass = 'warning';
            else if (evt.isExpiry && daysTo <= 365) dotClass = 'danger';
            event.appendChild(h('div', 'htimeline-evt-label', evt.label));
            event.appendChild(h('div', `htimeline-dot ${dotClass}`));
            event.appendChild(h('div', 'htimeline-evt-date', fmtShort(evt.date)));
            track2.appendChild(event);
          });
          track2Container.appendChild(track2);
          timelineSection.appendChild(track2Container);
        }

        // Obligation details list
        if (obligations.length > 0) {
          const obList = h('div');
          obList.style.marginTop = '12px';
          obligations.forEach(ob => {
            const obItem = h('div', 'htimeline-obligation');
            const obDot = h('div', 'ob-dot');
            obDot.style.backgroundColor = ob.overdue ? '#eb5757' : ob.actionable ? '#f2994a' : ob.inWindow ? '#0f7b6c' : '#d3d1cb';
            obItem.appendChild(obDot);
            obItem.appendChild(h('span', 'ob-label', ob.desc));
            obItem.appendChild(h('span', 'ob-date', fmtD(ob.dueDate.toISOString())));
            if (ob.actionable || ob.overdue) {
              const obBadge = h('span', 'ob-badge');
              obBadge.textContent = ob.overdue ? 'Overdue' : `${ob.daysUntil}d`;
              obBadge.style.backgroundColor = ob.overdue ? 'rgba(235,87,87,0.08)' : 'rgba(242,153,74,0.08)';
              obBadge.style.color = ob.overdue ? '#eb5757' : '#f2994a';
              obItem.appendChild(obBadge);
            }
            obList.appendChild(obItem);
          });
          timelineSection.appendChild(obList);
        }

        return timelineSection;
      };

      // === HELPER: Build Related Registrations ===
      const buildRelated = () => {
        const related = data.trademarks.filter(t => t.mark_text === trademark.mark_text && t.id !== trademark.id);
        if (related.length === 0) return null;

        const relSection = h('div', 'detail-section');
        relSection.appendChild(h('div', 'detail-section-title', `OTHER REGISTRATIONS OF "${trademark.mark_text}" (${related.length})`));
        const relList = h('div');
        relList.style.cssText = 'border:1px solid #e8e5e0;border-radius:8px;overflow:hidden;';

        related.forEach(rel => {
          const item = h('div', 'detail-related-item');
          const relStatus = getStatusColor(rel.status);
          const officeEl = h('span');
          officeEl.style.cssText = 'font-size:11px;font-weight:600;color:#2e6b8a;width:70px;flex-shrink:0;';
          officeEl.textContent = rel.registry_name;
          item.appendChild(officeEl);
          const numEl = h('span');
          numEl.style.cssText = 'flex:1;font-size:13px;color:#37352f;';
          numEl.textContent = rel.application_number;
          item.appendChild(numEl);
          const relBadge = h('span', 'detail-status-badge', rel.status);
          relBadge.style.backgroundColor = relStatus.bg;
          relBadge.style.color = relStatus.color;
          relBadge.style.fontSize = '11px';
          item.appendChild(relBadge);
          item.onclick = () => showTrademarkDetail(rel);
          relList.appendChild(item);
        });
        relSection.appendChild(relList);
        return relSection;
      };

      // === HELPER: Build Publication Notes ===
      const buildPubNotes = () => {
        if (!trademark.publication_notes && !trademark.notes) return null;
        const pubNotesSection = h('div', 'detail-section');
        pubNotesSection.appendChild(h('div', 'detail-section-title', 'PUBLICATION NOTES'));
        const noteText = h('div');
        noteText.style.cssText = 'font-size:13px;color:#37352f;line-height:1.5;padding:12px 14px;border:1px solid #e8e5e0;border-radius:8px;background:#fbfbfa;';
        noteText.textContent = trademark.publication_notes || trademark.notes || '';
        pubNotesSection.appendChild(noteText);
        return pubNotesSection;
      };

      // === ASSEMBLE BODY BASED ON STATUS ===
      if (isRegistered) {
        // Registered: Status → Notes → Rights Record (with G&S) → Compact Timeline → Related
        body.appendChild(buildNotesSection());
        body.appendChild(buildRightsRecord());
        body.appendChild(buildTimeline());
        const pubNotes = buildPubNotes();
        if (pubNotes) body.appendChild(pubNotes);
        const related = buildRelated();
        if (related) body.appendChild(related);
      } else {
        // Pending/Published: Status → Pre-reg Timeline → Rights Record (with G&S) → Notes → Related
        body.appendChild(buildTimeline());
        body.appendChild(buildRightsRecord());
        body.appendChild(buildNotesSection());
        const pubNotes = buildPubNotes();
        if (pubNotes) body.appendChild(pubNotes);
        const related = buildRelated();
        if (related) body.appendChild(related);
      }

      panel.appendChild(body);

      // Footer with actions
      const footer = h('div', 'detail-footer');
      if (trademark.trademark_url_on_ipo) {
        const ipoLink = document.createElement('a');
        ipoLink.className = 'detail-link';
        ipoLink.href = trademark.trademark_url_on_ipo;
        ipoLink.target = '_blank';
        ipoLink.rel = 'noopener noreferrer';
        ipoLink.textContent = '\uD83C\uDF10 View on ' + trademark.registry_name;
        footer.appendChild(ipoLink);
      }
      const closeFooter = h('button', 'btn-cancel', 'Close');
      closeFooter.onclick = () => overlay.classList.remove('open');
      footer.appendChild(closeFooter);
      panel.appendChild(footer);

      overlay.classList.add('open');
    };

    const buildRightPanel = () => {
      const rightPanel = document.getElementById('rightPanel');
      rightPanel.innerHTML = '';

      const title = h('div', 'panel-section-title', 'AILA INTELLIGENCE');
      rightPanel.appendChild(title);

      const actionMarks = data.trademarks.filter(t => {
        const days = calculateDaysRemaining(t.expiry_date);
        return days > 0 && days <= 365;
      }).length;

      const info1 = h('div', 'info-card');
      info1.appendChild(h('div', 'info-card-title', 'BRANDVAULT ALERT'));
      info1.appendChild(h('div', 'info-card-text', `${actionMarks} marks need renewal attention within the next 12 months.`));
      rightPanel.appendChild(info1);

      const registries = new Set(data.trademarks.map(t => t.registry_name)).size;
      const registered = data.trademarks.filter(t => t.status === 'Registered').length;

      const info2 = h('div', 'info-card');
      info2.appendChild(h('div', 'info-card-title', 'PORTFOLIO INSIGHT'));
      info2.appendChild(h('div', 'info-card-text', `${registered} registered marks across ${registries} registries. Strongest coverage in Class 9 and Class 42.`));
      rightPanel.appendChild(info2);

      const fetchedDate = new Date(data.fetchedAt || Date.now()).toLocaleDateString();
      const info3 = h('div', 'info-card');
      info3.appendChild(h('div', 'info-card-title', 'DATA SOURCE'));
      info3.appendChild(h('div', 'info-card-text', `Live data from LawPanel Firms API. Last fetched: ${fetchedDate}. Run lawpanel-fetch-trademarks.js to refresh.`));
      rightPanel.appendChild(info3);

      const renewalHeader = h('div');
      renewalHeader.classList.add('view-all');
      renewalHeader.appendChild(h('div', 'panel-section-title', 'Upcoming Renewals'));
      const viewAllLink = h('a', 'view-all-link', 'View all →');
      renewalHeader.appendChild(viewAllLink);
      rightPanel.appendChild(renewalHeader);

      const upcomingRenewals = data.trademarks
        .filter(t => {
          const days = calculateDaysRemaining(t.expiry_date);
          return days > 0 && days <= 180;
        })
        .sort((a, b) => calculateDaysRemaining(a.expiry_date) - calculateDaysRemaining(b.expiry_date))
        .slice(0, 5);

      const renewalList = h('div', 'renewal-list');
      upcomingRenewals.forEach((mark, idx) => {
        const days = calculateDaysRemaining(mark.expiry_date);
        const daysBadge = getDaysBadgeColor(days);

        const item = h('div', 'renewal-item');
        const initBadge = h('div', 'renewal-initials');
        initBadge.textContent = initials(mark.mark_text);
        initBadge.style.backgroundColor = badgeColors[idx % badgeColors.length];
        item.appendChild(initBadge);

        const info = h('div', 'renewal-info');
        info.appendChild(h('div', 'renewal-title', mark.mark_text));
        info.appendChild(h('div', 'renewal-sub', `${mark.registry_name} · ${new Date(mark.expiry_date).toLocaleDateString()}`));
        item.appendChild(info);

        const daysEl = h('div', 'renewal-days');
        daysEl.textContent = daysBadge.text;
        daysEl.style.backgroundColor = daysBadge.bg;
        daysEl.style.color = daysBadge.color;
        item.appendChild(daysEl);

        item.onclick = () => showTrademarkDetail(mark);
        renewalList.appendChild(item);
      });
      rightPanel.appendChild(renewalList);

      // Deadline Management section
      const deadlineHeader = h('div');
      deadlineHeader.classList.add('view-all');
      deadlineHeader.appendChild(h('div', 'panel-section-title', 'Actionable Deadlines'));
      rightPanel.appendChild(deadlineHeader);

      // Collect all actionable deadlines (within 6 months)
      const allDeadlines = [];
      data.trademarks.forEach(tm => {
        const obs = getObligationsForTrademark(tm);
        obs.forEach(ob => {
          if (ob.actionable || ob.inWindow) {
            allDeadlines.push({ trademark: tm, obligation: ob });
          }
        });
      });
      allDeadlines.sort((a, b) => a.obligation.daysUntil - b.obligation.daysUntil);

      if (allDeadlines.length > 0) {
        // Jira export bar
        const jiraBar = h('div', 'jira-export-bar');
        jiraBar.appendChild(h('span', 'jira-label', `${allDeadlines.length} actionable deadline${allDeadlines.length > 1 ? 's' : ''}`));
        const jiraBtn = h('button', 'jira-export-btn');
        jiraBtn.innerHTML = '\uD83D\uDCCB Copy for Jira';
        jiraBtn.onclick = () => {
          const lines = allDeadlines.map(d => {
            const tm = d.trademark;
            const ob = d.obligation;
            const due = ob.dueDate.toISOString().split('T')[0];
            return `[${tm.mark_text}] ${ob.type} - ${tm.registry_name} ${tm.application_number} | Due: ${due} (${ob.daysUntil}d) | ${ob.desc}`;
          });
          const text = 'BRANDVAULT DEADLINES\n' + '='.repeat(40) + '\n' + lines.join('\n');
          navigator.clipboard.writeText(text).then(() => {
            jiraBtn.classList.add('copied');
            jiraBtn.textContent = '\u2705 Copied!';
            setTimeout(() => { jiraBtn.classList.remove('copied'); jiraBtn.innerHTML = '\uD83D\uDCCB Copy for Jira'; }, 2000);
          });
        };
        jiraBar.appendChild(jiraBtn);
        rightPanel.appendChild(jiraBar);

        // Individual deadline cards
        allDeadlines.slice(0, 8).forEach(d => {
          const tm = d.trademark;
          const ob = d.obligation;
          const urgency = ob.daysUntil <= 60 ? 'urgent' : ob.daysUntil <= 120 ? 'soon' : 'upcoming';
          const card = h('div', `deadline-card ${urgency}`);

          const info = h('div', 'deadline-info');
          info.appendChild(h('div', 'deadline-mark', `${tm.mark_text} \u00B7 ${tm.registry_name}`));
          info.appendChild(h('div', 'deadline-desc', ob.type + ' \u2014 ' + ob.desc));
          card.appendChild(info);

          const daysBadge = getDaysBadgeColor(ob.daysUntil);
          const badge = h('div', 'deadline-badge');
          badge.textContent = `${ob.daysUntil}d`;
          badge.style.backgroundColor = daysBadge.bg;
          badge.style.color = daysBadge.color;
          card.appendChild(badge);

          card.onclick = () => showTrademarkDetail(tm);
          rightPanel.appendChild(card);
        });
      } else {
        rightPanel.appendChild(h('div', 'deadline-empty', 'No actionable deadlines in the next 6 months'));
      }
    };

    let reportFilters = { offices: [], statuses: [], mark: 'all', format: 'csv' };

    const getFilteredTrademarks = () => {
      return data.trademarks.filter(t => {
        if (reportFilters.offices.length > 0 && !reportFilters.offices.includes(t.registry_name)) return false;
        if (reportFilters.statuses.length > 0 && !reportFilters.statuses.includes(t.status)) return false;
        if (reportFilters.mark !== 'all' && t.mark_text !== reportFilters.mark) return false;
        return true;
      });
    };

    const updatePreview = () => {
      const previewEl = document.getElementById('reportPreview');
      if (!previewEl) return;
      const filtered = getFilteredTrademarks();
      const previewTitle = document.getElementById('previewTitle');
      if (previewTitle) previewTitle.textContent = `PREVIEW (${filtered.length} MARKS)`;

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Mark', 'Registry', 'Status', 'Nice Classes'].forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      filtered.slice(0, 20).forEach(t => {
        const tr = document.createElement('tr');
        const classes = (t.good_and_services || []).map(gs => gs.search_class ? gs.search_class.number : '').filter(Boolean).join(', ');
        [t.mark_text, t.registry_name, t.status, classes].forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      previewEl.textContent = '';
      previewEl.appendChild(table);

      const dlBtn = document.getElementById('downloadBtn');
      if (dlBtn) dlBtn.textContent = `Download ${reportFilters.format.toUpperCase()}`;
    };

    const toggleChip = (chip, value, filterArray, filterKey) => {
      const idx = reportFilters[filterKey].indexOf(value);
      if (idx >= 0) {
        reportFilters[filterKey].splice(idx, 1);
        chip.classList.remove('active');
      } else {
        reportFilters[filterKey].push(value);
        chip.classList.add('active');
      }
      updatePreview();
    };

    const buildReportPanel = () => {
      const overlay = document.getElementById('reportOverlay');
      const backdrop = document.getElementById('reportBackdrop');
      const panel = document.getElementById('reportPanel');
      panel.textContent = '';
      reportFilters = { offices: [], statuses: [], mark: 'all', format: 'csv' };

      backdrop.onclick = () => overlay.classList.remove('open');

      // Header
      const header = h('div', 'report-header');
      const h2 = document.createElement('h2');
      h2.textContent = '📊 Report';
      header.appendChild(h2);
      const closeBtn = h('button', 'report-close', '✕');
      closeBtn.onclick = () => overlay.classList.remove('open');
      header.appendChild(closeBtn);
      panel.appendChild(header);

      // Body
      const body = h('div', 'report-body');

      // Quick Presets
      const presetSection = h('div', 'report-section');
      presetSection.appendChild(h('div', 'report-section-title', 'QUICK PRESETS'));
      const presetList = h('div', 'preset-list');

      const presets = [
        { icon: '📋', name: 'Full Portfolio', desc: 'All marks, all fields, CSV', offices: [], statuses: [], mark: 'all', format: 'csv' },
        { icon: '🔄', name: 'Renewal Review', desc: 'Registered marks with renewal dates, Excel', offices: [], statuses: ['Registered'], mark: 'all', format: 'xlsx' },
        { icon: '📊', name: 'Mark Overview', desc: 'All marks with Nice class counts, Excel', offices: [], statuses: [], mark: 'all', format: 'xlsx' },
        { icon: '🏢', name: 'Registry Summary', desc: 'Stats by registry office, CSV', offices: [], statuses: [], mark: 'all', format: 'csv' }
      ];

      let selectedPreset = null;
      presets.forEach((preset, idx) => {
        const item = h('div', 'preset-item');
        item.appendChild(h('div', 'preset-icon', preset.icon));
        const info = h('div', 'preset-info');
        info.appendChild(h('div', 'preset-name', preset.name));
        info.appendChild(h('div', 'preset-desc', preset.desc));
        item.appendChild(info);
        item.onclick = () => {
          if (selectedPreset) selectedPreset.classList.remove('selected');
          item.classList.add('selected');
          selectedPreset = item;
          reportFilters.offices = [...preset.offices];
          reportFilters.statuses = [...preset.statuses];
          reportFilters.mark = preset.mark;
          reportFilters.format = preset.format;
          // Update chip states
          document.querySelectorAll('.filter-chip[data-type="office"]').forEach(c => {
            c.classList.toggle('active', reportFilters.offices.includes(c.dataset.value));
          });
          document.querySelectorAll('.filter-chip[data-type="status"]').forEach(c => {
            c.classList.toggle('active', reportFilters.statuses.includes(c.dataset.value));
          });
          document.querySelectorAll('.format-card').forEach(c => {
            c.classList.toggle('selected', c.dataset.format === reportFilters.format);
          });
          const markSelect = document.getElementById('markFilter');
          if (markSelect) markSelect.value = reportFilters.mark;
          updatePreview();
        };
        presetList.appendChild(item);
      });
      presetSection.appendChild(presetList);
      body.appendChild(presetSection);

      // Filters
      const filterSection = h('div', 'report-section');
      filterSection.appendChild(h('div', 'report-section-title', 'FILTERS'));

      // Registry filter chips
      filterSection.appendChild(h('div', 'filter-label', 'Registry'));
      const officeChips = h('div', 'filter-chips');
      const offices = [...new Set(data.trademarks.map(t => t.registry_name))].sort();
      offices.forEach(office => {
        const chip = h('div', 'filter-chip', office);
        chip.dataset.type = 'office';
        chip.dataset.value = office;
        chip.onclick = () => toggleChip(chip, office, reportFilters.offices, 'offices');
        officeChips.appendChild(chip);
      });
      filterSection.appendChild(officeChips);

      // Status filter chips
      filterSection.appendChild(h('div', 'filter-label', 'Status'));
      const statusChips = h('div', 'filter-chips');
      const statusCounts = {};
      data.trademarks.forEach(t => { statusCounts[t.status] = (statusCounts[t.status] || 0) + 1; });
      Object.entries(statusCounts).forEach(([status, count]) => {
        const chip = h('div', 'filter-chip', `${status} (${count})`);
        chip.dataset.type = 'status';
        chip.dataset.value = status;
        chip.onclick = () => toggleChip(chip, status, reportFilters.statuses, 'statuses');
        statusChips.appendChild(chip);
      });
      filterSection.appendChild(statusChips);

      // Mark dropdown
      filterSection.appendChild(h('div', 'filter-label', 'Mark'));
      const markSelect = document.createElement('select');
      markSelect.className = 'filter-select';
      markSelect.id = 'markFilter';
      const allOption = document.createElement('option');
      allOption.value = 'all';
      allOption.textContent = 'All marks';
      markSelect.appendChild(allOption);
      const marks = [...new Set(data.trademarks.map(t => t.mark_text))].sort();
      marks.forEach(mark => {
        const opt = document.createElement('option');
        opt.value = mark;
        opt.textContent = mark;
        markSelect.appendChild(opt);
      });
      markSelect.onchange = () => { reportFilters.mark = markSelect.value; updatePreview(); };
      filterSection.appendChild(markSelect);

      body.appendChild(filterSection);

      // Export Format
      const formatSection = h('div', 'report-section');
      formatSection.appendChild(h('div', 'report-section-title', 'EXPORT FORMAT'));
      const formatRow = h('div', 'format-row');
      const formats = [
        { key: 'csv', icon: '📄', label: 'CSV', desc: 'Comma-separated' },
        { key: 'xlsx', icon: '📊', label: 'Excel', desc: 'Two-sheet workbook' },
        { key: 'pdf', icon: '📑', label: 'PDF', desc: 'Print-ready report' }
      ];
      formats.forEach(fmt => {
        const card = h('div', 'format-card' + (fmt.key === 'csv' ? ' selected' : ''));
        card.dataset.format = fmt.key;
        card.appendChild(h('div', 'fmt-icon', fmt.icon));
        card.appendChild(h('div', 'fmt-label', fmt.label));
        card.appendChild(h('div', 'fmt-desc', fmt.desc));
        card.onclick = () => {
          document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          reportFilters.format = fmt.key;
          updatePreview();
        };
        formatRow.appendChild(card);
      });
      formatSection.appendChild(formatRow);
      body.appendChild(formatSection);

      // Preview
      const previewSection = h('div', 'report-section');
      const previewTitle = h('div', 'report-section-title', `PREVIEW (${data.trademarks.length} MARKS)`);
      previewTitle.id = 'previewTitle';
      previewSection.appendChild(previewTitle);
      const preview = h('div', 'report-preview');
      preview.id = 'reportPreview';
      previewSection.appendChild(preview);
      body.appendChild(previewSection);

      panel.appendChild(body);

      // Footer
      const footer = h('div', 'report-footer');
      const cancelBtn = h('button', 'btn-cancel', 'Cancel');
      cancelBtn.onclick = () => overlay.classList.remove('open');
      footer.appendChild(cancelBtn);
      const downloadBtn = h('button', 'btn-download', 'Download CSV');
      downloadBtn.id = 'downloadBtn';
      downloadBtn.onclick = () => {
        if (reportFilters.format === 'csv') exportCSV();
        else if (reportFilters.format === 'xlsx') exportXLSX();
        else exportPDF();
      };
      footer.appendChild(downloadBtn);
      panel.appendChild(footer);

      updatePreview();
    };

    const exportCSV = () => {
      const filtered = getFilteredTrademarks();
      const headers = ['Mark Name', 'Registry', 'Application Number', 'Status', 'Expiry Date', 'Nice Classes'];
      const rows = filtered.map(t => [
        t.mark_text,
        t.registry_name,
        t.application_number,
        t.status,
        new Date(t.expiry_date).toLocaleDateString(),
        (t.good_and_services || []).map(gs => gs.search_class ? gs.search_class.number : '').filter(Boolean).join('; ')
      ]);

      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(cell => `"${cell}"`).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = h('a');
      a.href = url;
      a.download = 'trademarks.csv';
      a.click();
      window.URL.revokeObjectURL(url);
    };

    const exportXLSX = () => {
      const filtered = getFilteredTrademarks();
      const headers = ['Mark Name', 'Registry', 'Application Number', 'Status', 'Expiry Date', 'Nice Classes'];
      const rows = filtered.map(t => [
        t.mark_text,
        t.registry_name,
        t.application_number,
        t.status,
        new Date(t.expiry_date).toLocaleDateString(),
        (t.good_and_services || []).map(gs => gs.search_class ? gs.search_class.number : '').filter(Boolean).join('; ')
      ]);

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Trademarks');
      XLSX.writeFile(wb, 'trademarks.xlsx');
    };

    const exportPDF = () => {
      const filtered = getFilteredTrademarks();
      const element = document.createElement('div');
      element.style.padding = '20px';
      element.style.fontFamily = 'Inter, Arial, sans-serif';

      const title = document.createElement('h1');
      title.textContent = 'BrandVault — Trademark Portfolio Report';
      title.style.cssText = 'font-size:22px;margin-bottom:4px;color:#37352f;';
      element.appendChild(title);

      const dateLine = document.createElement('p');
      dateLine.textContent = 'Generated: ' + new Date().toLocaleDateString();
      dateLine.style.cssText = 'font-size:12px;color:#9b9a97;margin-bottom:20px;';
      element.appendChild(dateLine);

      const summaryH = document.createElement('h2');
      summaryH.textContent = 'Summary';
      summaryH.style.cssText = 'font-size:16px;margin-bottom:8px;color:#37352f;';
      element.appendChild(summaryH);

      const summaryP = document.createElement('p');
      summaryP.textContent = `${filtered.length} marks · ${filtered.filter(t=>t.status==='Registered').length} registered · ${filtered.filter(t=>t.status==='Pending').length} pending · ${filtered.filter(t=>t.status==='Published').length} published`;
      summaryP.style.cssText = 'font-size:13px;color:#37352f;margin-bottom:20px;';
      element.appendChild(summaryP);

      const table = document.createElement('table');
      table.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;';
      const thead = document.createElement('thead');
      const hRow = document.createElement('tr');
      ['Mark', 'Registry', 'Application No.', 'Status', 'Expiry', 'Nice Classes'].forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        th.style.cssText = 'border:1px solid #ddd;padding:6px 8px;background:#f7f6f5;text-align:left;font-weight:600;';
        hRow.appendChild(th);
      });
      thead.appendChild(hRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      filtered.forEach(t => {
        const tr = document.createElement('tr');
        const classes = (t.good_and_services||[]).map(gs=>gs.search_class?gs.search_class.number:'').filter(Boolean).join(', ');
        [t.mark_text, t.registry_name, t.application_number, t.status, new Date(t.expiry_date).toLocaleDateString(), classes].forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          td.style.cssText = 'border:1px solid #ddd;padding:6px 8px;';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      element.appendChild(table);
      document.body.appendChild(element);

      const opt = {
        margin: 10,
        filename: 'trademarks.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };

      html2pdf().set(opt).from(element).save().then(() => {
        document.body.removeChild(element);
      });
    };

    const renderApp = () => {
      buildSidebar();
      buildTopbar();
      buildContentArea();
      buildRightPanel();
      buildReportPanel();
    };

    loadData();
  </script>
</body>
</html>
